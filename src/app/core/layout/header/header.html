<header class="bg-primary text-white shadow-md">

  <!-- ═══ ROW 1 : Logo + Nav + Actions ═══ -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-6 h-16">

      <!-- Logo -->
      <a routerLink="/"
         class="flex items-center gap-2 shrink-0 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent rounded-lg"
         aria-label="Bazar Comores — Accueil">
        <span class="text-2xl" aria-hidden="true">🛒</span>
        <span class="text-xl font-bold tracking-wide">
          BAZAR<span class="text-accent ml-1">Comores</span>
        </span>
      </a>

      <!-- Nav desktop -->
      <nav class="hidden md:flex items-center gap-1 flex-1" aria-label="Navigation principale">
        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path"
             routerLinkActive="text-white bg-white/10 font-semibold"
             [routerLinkActiveOptions]="{ exact: link.exact }"
             class="px-3 py-2 rounded-lg text-sm text-white/75 hover:text-white hover:bg-white/10
                    transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent">
            {{ link.label }}
          </a>
        }
      </nav>

      <!-- Actions droite -->
      <div class="flex items-center gap-1 ml-auto md:ml-0">

        <!-- Panier -->
        <a routerLink="/panier"
           class="relative flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-white/80
                  hover:text-white hover:bg-white/10 transition-colors
                  focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent"
           aria-label="Mon panier">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="9" cy="21" r="1" /><circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          <span class="hidden sm:inline">Panier</span>
          @if (cartCount() > 0) {
            <span class="min-w-[18px] h-[18px] bg-accent text-primary text-[10px] font-bold
                         rounded-full inline-flex items-center justify-center px-1 leading-none"
                  [attr.aria-label]="cartCount() + ' articles'">
              {{ cartCount() }}
            </span>
          }
        </a>

        <!-- Connexion -->
        <a routerLink="/connexion"
           class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm text-white/80
                  hover:text-white hover:bg-white/10 transition-colors
                  focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent"
           aria-label="Mon compte">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span class="hidden sm:inline">Connexion</span>
        </a>

        <!-- Burger mobile -->
        <button type="button"
                (click)="toggleMenu()"
                class="md:hidden p-2 rounded-lg text-white hover:bg-white/10 transition-colors
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent"
                [attr.aria-expanded]="isMenuOpen()"
                aria-controls="mobile-menu"
                aria-label="Menu de navigation">
          @if (isMenuOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6"  x2="21" y2="6"  />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          }
        </button>
      </div>

    </div>
  </div>

  <!-- ═══ ROW 2 : Search bar seule ═══ -->
  <div class="border-t border-white/10 py-2.5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <!-- Search desktop -->
      <div class="hidden md:flex w-full max-w-3xl mx-auto" role="search">
        <div class="flex w-full rounded-xl overflow-hidden ring-2 ring-white/20 focus-within:ring-accent transition-all">
          <label for="header-search-category" class="sr-only">Catégorie</label>
          <select id="header-search-category"
                  class="px-4 py-2.5 text-sm text-foreground bg-white border-r border-border
                         focus:outline-none cursor-pointer shrink-0">
            <option value="">Toutes catégories</option>
            <option value="legumes">Légumes</option>
            <option value="fruits">Fruits</option>
            <option value="epices">Épices</option>
            <option value="seches">Produits secs</option>
          </select>
          <input id="header-search"
                 type="search"
                 placeholder="Rechercher un produit comorien…"
                 class="flex-1 px-4 py-2.5 text-sm text-foreground bg-white focus:outline-none"
                 aria-label="Rechercher un produit" />
          <button type="button"
                  class="px-6 bg-accent text-primary font-semibold hover:bg-accent-hover transition-colors"
                  aria-label="Lancer la recherche">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══ Menu mobile ═══ -->
  @if (isMenuOpen()) {
    <nav id="mobile-menu"
         class="md:hidden border-t border-white/10 bg-primary-hover"
         aria-label="Navigation mobile">
      <div class="max-w-7xl mx-auto px-4 py-3 flex flex-col gap-1">

        @for (link of navLinks; track link.path) {
          <a [routerLink]="link.path"
             routerLinkActive="text-accent bg-white/10"
             [routerLinkActiveOptions]="{ exact: link.exact }"
             (click)="toggleMenu()"
             class="px-3 py-2 rounded-lg text-sm text-white/80 hover:text-white hover:bg-white/10
                    transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent">
            {{ link.label }}
          </a>
        }

        <!-- Search mobile -->
        <div class="mt-2 pt-3 border-t border-white/10" role="search">
          <div class="flex rounded-xl overflow-hidden">
            <input type="search"
                   placeholder="Rechercher un produit…"
                   class="flex-1 px-4 py-2.5 text-sm text-foreground bg-white focus:outline-none"
                   aria-label="Rechercher un produit" />
            <button type="button"
                    class="px-4 bg-accent text-primary"
                    aria-label="Lancer la recherche">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                   fill="none" stroke="currentColor" stroke-width="2.5"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
            </button>
          </div>
        </div>

      </div>
    </nav>
  }

</header>
