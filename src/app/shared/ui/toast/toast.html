<div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 pointer-events-none
            transition-all duration-300 ease-out"
     [class.opacity-0]="!visible()"
     [class.opacity-100]="visible()"
     [class.translate-y-4]="!visible()"
     [class.translate-y-0]="visible()"
     role="status"
     aria-live="polite">
  <div class="flex items-center gap-3 bg-foreground text-white text-sm font-medium
              px-5 py-3 rounded-2xl shadow-xl">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round"
         class="text-accent shrink-0" aria-hidden="true">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    {{ label() }}
  </div>
</div>
