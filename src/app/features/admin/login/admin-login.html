<div class="min-h-screen bg-gradient-to-br from-primary to-primary-hover flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 text-white">
        <span class="text-3xl">🛒</span>
        <div class="text-left">
          <p class="text-xl font-black leading-none">Bazar Comores</p>
          <p class="text-xs text-white/60 font-medium tracking-wider uppercase">Administration</p>
        </div>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8 flex flex-col gap-6">
      <div>
        <h1 class="text-xl font-black text-foreground">Connexion admin</h1>
        <p class="text-sm text-muted mt-1">Accès réservé à l'équipe Bazar Comores.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4" novalidate>

        <!-- Email -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-foreground uppercase tracking-wide" for="email">
            Email
          </label>
          <input id="email" type="email" formControlName="email"
                 placeholder="admin@bazarcomores.com"
                 class="px-4 py-2.5 rounded-xl border-2 border-border text-sm text-foreground bg-white
                        focus:outline-none focus:border-primary transition-colors placeholder:text-muted/50" />
          @if (form.get('email')?.invalid && form.get('email')?.touched) {
            <p class="text-xs text-error">Email invalide</p>
          }
        </div>

        <!-- Mot de passe -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-bold text-foreground uppercase tracking-wide" for="password">
            Mot de passe
          </label>
          <input id="password" type="password" formControlName="password"
                 placeholder="••••••••"
                 class="px-4 py-2.5 rounded-xl border-2 border-border text-sm text-foreground bg-white
                        focus:outline-none focus:border-primary transition-colors placeholder:text-muted/50" />
        </div>

        <!-- Erreur -->
        @if (error()) {
          <div class="bg-red-50 border border-red-200 rounded-xl px-4 py-2.5 text-sm text-red-600 flex items-center gap-2">
            ⚠️ {{ error() }}
          </div>
        }

        <!-- Submit -->
        <button type="submit"
                [disabled]="loading()"
                class="w-full py-3 rounded-xl bg-primary text-white font-semibold text-sm
                       hover:bg-primary-hover active:scale-[0.98] transition-all
                       disabled:opacity-60 disabled:cursor-not-allowed
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary">
          {{ loading() ? 'Connexion…' : 'Se connecter' }}
        </button>

      </form>
    </div>

  </div>
</div>
