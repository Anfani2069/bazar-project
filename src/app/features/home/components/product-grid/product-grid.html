<section class="py-10 px-4 max-w-7xl mx-auto" aria-label="Produits suggérés">

  <!-- Header -->
  <div class="flex items-end justify-between mb-6">
    <div>
      <p class="text-xs font-semibold text-accent uppercase tracking-widest mb-1">Sélection</p>
      <h2 class="text-2xl font-bold text-foreground">Vous pourriez aimer</h2>
    </div>
    <a routerLink="/catalogue"
       class="text-sm font-medium text-primary underline-offset-2 hover:underline
              focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary rounded">
      Voir tout →
    </a>
  </div>

  <!-- Grille produits -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
    @for (product of products; track product.id) {
      <ui-product-card
        [product]="product"
        (addToCart)="addToCart($event)"
      />
    }
  </div>

</section>
