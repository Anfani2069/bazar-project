<section class="py-10 px-4 max-w-7xl mx-auto" aria-label="Meilleures ventes">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <p class="text-xs font-semibold text-accent uppercase tracking-widest mb-1">Tendances</p>
      <h2 class="text-2xl font-bold text-foreground">Meilleures ventes de la semaine</h2>
    </div>

    <!-- Arrows -->
    <div class="hidden sm:flex items-center gap-2">
      <button type="button"
              (click)="scroll('left')"
              class="w-10 h-10 rounded-full border-2 border-border flex items-center justify-center
                     text-muted hover:border-primary hover:text-primary transition-colors
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary"
              aria-label="Produits précédents">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
      <button type="button"
              (click)="scroll('right')"
              class="w-10 h-10 rounded-full bg-primary flex items-center justify-center
                     text-white hover:bg-primary-hover transition-colors
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary"
              aria-label="Produits suivants">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Carousel -->
  <div #scrollRef
       class="flex gap-4 overflow-x-auto scroll-smooth pb-2
              [scrollbar-width:none] [&::-webkit-scrollbar]:hidden"
       role="list"
       aria-label="Liste des meilleures ventes">
    @for (product of products; track product.id) {
      <div class="shrink-0 w-[240px]" role="listitem">
        <ui-product-card
          [product]="product"
          (addToCart)="addToCart($event)"
        />
      </div>
    }
  </div>

</section>
