<section class="bg-primary py-14" aria-label="Pourquoi choisir Bazar Comores">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <!-- Header section -->
    <div class="text-center mb-10">
      <p class="text-xs font-bold text-accent uppercase tracking-widest mb-2">Nos engagements</p>
      <h2 class="text-2xl sm:text-3xl font-black text-white">
        Pourquoi choisir <span class="text-accent">Bazar Comores</span> ?
      </h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

      @for (item of items; track item.icon) {
        <div class="group flex flex-col items-center text-center gap-4 p-6
                    bg-white/8 border border-white/10 rounded-2xl
                    hover:bg-white/15 hover:border-white/20 hover:scale-105
                    transition-all duration-300 cursor-default">

          <!-- Icône -->
          <div class="w-14 h-14 rounded-2xl bg-accent/15 border border-accent/30
                      flex items-center justify-center shrink-0
                      group-hover:bg-accent group-hover:border-accent transition-colors">
            <span class="text-2xl" aria-hidden="true">{{ item.icon }}</span>
          </div>

          <!-- Valeur prominente -->
          <p class="text-3xl font-black text-white">{{ item.value }}</p>

          <!-- Label + description -->
          <div>
            <p class="text-sm font-bold text-white/90 mb-1">{{ item.label }}</p>
            <p class="text-xs text-white/55 leading-relaxed">{{ item.description }}</p>
          </div>

        </div>
      }

    </div>

  </div>
</section>
